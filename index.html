<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL to QR Code Generator</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for a professional look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Custom styles to enhance Tailwind */
        body {
            font-family: 'Inter', sans-serif;
            /* --- UPDATED BACKGROUND --- */
            /* This now points to your local image file */
            background-image: linear-gradient(rgba(26, 32, 44, 0.85), rgba(26, 32, 44, 0.85)), url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        /* Custom styling for the QR code container to add a nice glow effect */
        #qrcode-container.generated {
            box-shadow: 0 0 25px rgba(0, 170, 255, 0.5);
        }
        /* Style for placeholder text color */
        ::placeholder {
            color: #718096;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-gray-800 rounded-2xl shadow-2xl p-8 space-y-6 text-white transform transition-all hover:scale-105 duration-500">
        <!-- Header Section -->
        <div class="text-center">
            <h1 class="text-3xl font-bold tracking-tight">QR Code Generator</h1>
            <p class="text-gray-400 mt-2">Instantly convert any URL into a scannable QR code.</p>
        </div>

        <!-- Input and Button Section -->
        <div class="space-y-4">
            <input 
                type="url" 
                id="url-input" 
                placeholder="https://example.com" 
                class="w-full px-4 py-3 bg-gray-700 border-2 border-gray-600 rounded-lg focus:outline-none focus:ring-4 focus:ring-blue-500 focus:border-blue-500 transition-all duration-300"
                required
            >
            <button 
                id="generate-btn" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-transform transform hover:scale-105 duration-300 focus:outline-none focus:ring-4 focus:ring-blue-500"
            >
                Generate QR Code
            </button>
        </div>
        
        <!-- QR Code Display Area -->
        <div id="qrcode-container" class="bg-white p-4 rounded-lg flex justify-center items-center h-64 w-64 mx-auto transition-all duration-300">
            <div id="qrcode"></div>
            <p id="placeholder-text" class="text-gray-400 text-center">Your QR code will appear here</p>
        </div>

        <!-- Download Button (Initially hidden) -->
        <button 
            id="download-btn" 
            class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition-all duration-300 opacity-0 transform scale-95 pointer-events-none"
        >
            Download QR Code
        </button>

        <!-- Error Message Display -->
        <p id="error-message" class="text-red-400 text-center text-sm h-5"></p>

    </div>

    <!-- UPDATED QR Code Generation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script>
        // DOM Element References
        const urlInput = document.getElementById('url-input');
        const generateBtn = document.getElementById('generate-btn');
        const qrCodeContainer = document.getElementById('qrcode-container');
        const qrCodeDiv = document.getElementById('qrcode');
        const placeholderText = document.getElementById('placeholder-text');
        const downloadBtn = document.getElementById('download-btn');
        const errorMessage = document.getElementById('error-message');
        
        let qrCodeInstance = null; // To hold the QRCode.js instance
        let qrCodeDataURL = null; // To hold the generated QR code image data for download

        // --- Event Listeners ---
        generateBtn.addEventListener('click', handleGenerateClick);
        downloadBtn.addEventListener('click', handleDownloadClick);

        /**
         * Handles the "Generate QR Code" button click event.
         * Validates input and triggers QR code creation.
         */
        function handleGenerateClick() {
            const url = urlInput.value.trim();

            // Clear previous state
            clearQRCode();
            errorMessage.textContent = '';

            // Input validation
            if (!url) {
                errorMessage.textContent = 'Please enter a URL.';
                return;
            }
            
            // Simple URL format check
            if (!isValidHttpUrl(url)) {
                errorMessage.textContent = 'Please enter a valid URL (e.g., https://example.com).';
                return;
            }

            // Show loading state (optional) and generate
            placeholderText.textContent = 'Generating...';
            
            // Use a short timeout to allow the UI to update before QR code generation
            setTimeout(() => {
                try {
                    // Create new QR Code
                    qrCodeInstance = new QRCode(qrCodeDiv, {
                        text: url,
                        width: 256,
                        height: 256,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });

                    // Hide placeholder and show container glow
                    placeholderText.style.display = 'none';
                    qrCodeContainer.classList.add('generated');

                    // Make the download button visible and functional
                    showDownloadButton();

                } catch (error) {
                    errorMessage.textContent = 'Could not generate QR code. Please try again.';
                    console.error(error);
                }
            }, 100);
        }
        
        /**
         * Handles the "Download QR Code" button click event.
         */
        function handleDownloadClick() {
            // Invalidate the old data URL to regenerate it with the latest QR code
            qrCodeDataURL = null; 

            if (!qrCodeDataURL) {
                // Get the data URL from the canvas element created by the library
                const canvas = qrCodeDiv.querySelector('canvas');
                if(canvas) {
                    qrCodeDataURL = canvas.toDataURL('image/png');
                } else {
                    errorMessage.textContent = 'Could not find QR code image to download.';
                    return;
                }
            }

            // Create a temporary link element to trigger the download
            const link = document.createElement('a');
            link.href = qrCodeDataURL;
            link.download = 'qrcode.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        /**
         * Clears the previously generated QR code and resets the UI.
         */
        function clearQRCode() {
            if (qrCodeInstance) {
                qrCodeDiv.innerHTML = '';
                qrCodeInstance = null;
            }
            qrCodeDataURL = null; // Reset stored data URL
            placeholderText.textContent = 'Your QR code will appear here';
            placeholderText.style.display = 'block';
            qrCodeContainer.classList.remove('generated');
            
            // Hide and disable the download button
            downloadBtn.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
        }

        /**
         * Makes the download button visible and clickable.
         */
        function showDownloadButton() {
            // Slight delay for a smoother animation
            setTimeout(() => {
                downloadBtn.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
            }, 300);
        }

        /**
         * Validates if a string is a well-formed URL.
         * @param {string} string The string to validate.
         * @returns {boolean} True if the string is a valid URL, false otherwise.
         */
        function isValidHttpUrl(string) {
            let url;
            try {
                url = new URL(string);
            } catch (_) {
                return false;  
            }
            return url.protocol === "http:" || url.protocol === "https:";
        }
    </script>
</body>
</html>
