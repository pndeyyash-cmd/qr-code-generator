<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VardhanFlow | QR Sticker Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* Custom styles to enhance Tailwind */
        body {
            font-family: 'Inter', sans-serif;
            background-image: linear-gradient(rgba(26, 32, 44, 0.85), rgba(26, 32, 44, 0.85)), url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        ::placeholder {
            color: #718096;
        }
        /* Custom Sticker Styling */
        #capture-area {
            width: 320px;
            background-color: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 0 25px rgba(0, 170, 255, 0.2);
            display: none; /* Hidden until generated */
        }
        #capture-area.generated {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <nav class="absolute top-0 left-0 w-full p-4">
        <div class="container mx-auto">
            <p class="text-white text-lg font-semibold">Developed by Yash Vardhan</p>
        </div>
    </nav>

    <div class="w-full max-w-4xl grid md:grid-cols-2 gap-8 items-start">
        
        <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 space-y-6 text-white transform transition-all duration-500">
            <div class="text-center">
                <h1 class="text-3xl font-bold tracking-tight">VardhanFlow Admin</h1>
                <p class="text-gray-400 mt-2">Generate Print-Ready QR Menu Stickers</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-sm text-gray-400 mb-1 block">Target Menu URL</label>
                    <input type="url" id="url-input" placeholder="https://yashpndy.github.io/menu1" 
                        class="w-full px-4 py-3 bg-gray-700 border-2 border-gray-600 rounded-lg focus:outline-none focus:ring-4 focus:ring-blue-500 transition-all">
                </div>
                
                <div>
                    <label class="text-sm text-gray-400 mb-1 block">Sticker CTA Text</label>
                    <input type="text" id="cta-input" placeholder="Hungry? Scan Me! 🍕" 
                        class="w-full px-4 py-3 bg-gray-700 border-2 border-gray-600 rounded-lg focus:outline-none focus:ring-4 focus:ring-blue-500 transition-all">
                </div>

                <button id="generate-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-transform transform hover:scale-105 duration-300">
                    Generate Sticker
                </button>
            </div>

            <p id="error-message" class="text-red-400 text-center text-sm h-5"></p>
        </div>

        <div class="flex flex-col items-center justify-center space-y-6 w-full">
            
            <div id="capture-area">
                <h2 id="preview-cta" class="text-black text-2xl font-bold text-center leading-tight">Hungry? Scan Me! 🍕</h2>
                <div id="qrcode" class="bg-white border-4 border-gray-100 p-2 rounded-xl"></div>
                <div class="text-center mt-2 w-full border-t-2 border-dashed border-gray-300 pt-3">
                    <p class="text-blue-900 font-extrabold text-lg tracking-tight uppercase">VardhanFlow</p>
                    <p class="text-gray-600 text-xs font-semibold mt-1">Software: 8874377426</p>
                    <p class="text-gray-600 text-xs font-semibold">pndeyyash@gmail.com</p>
                </div>
            </div>

            <button id="download-btn" class="w-full max-w-[320px] bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition-all duration-300 hidden">
                Download Print-Ready PNG
            </button>
        </div>

    </div>

    <script>
        // DOM Elements
        const urlInput = document.getElementById('url-input');
        const ctaInput = document.getElementById('cta-input');
        const generateBtn = document.getElementById('generate-btn');
        const captureArea = document.getElementById('capture-area');
        const previewCta = document.getElementById('preview-cta');
        const qrCodeDiv = document.getElementById('qrcode');
        const downloadBtn = document.getElementById('download-btn');
        const errorMessage = document.getElementById('error-message');

        let qrCodeInstance = null;

        // Validation Function
        function isValidHttpUrl(string) {
            let url;
            try {
                url = new URL(string);
            } catch (_) {
                return false;  
            }
            return url.protocol === "http:" || url.protocol === "https:";
        }

        // Generate Logic
        generateBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            const cta = ctaInput.value.trim() || "Hungry? Scan Me! 🍕";

            errorMessage.textContent = '';

            if (!url) {
                errorMessage.textContent = 'Please enter a URL.';
                return;
            }
            if (!isValidHttpUrl(url)) {
                errorMessage.textContent = 'Please enter a valid URL (e.g., https://example.com).';
                return;
            }

            // Update CTA Text
            previewCta.textContent = cta;
            
            // Clear old QR
            qrCodeDiv.innerHTML = '';

            // Generate new QR (Solid white background for better printing contrast)
            qrCodeInstance = new QRCodeStyling({
                width: 220,
                height: 220,
                data: url,
                margin: 0,
                dotsOptions: { color: "#1e3a8a", type: "rounded" },
                backgroundOptions: { color: "#ffffff" },
                cornersSquareOptions: { type: "extra-rounded", color: "#1e3a8a" }
            });

            qrCodeInstance.append(qrCodeDiv);

            // Show the sticker and download button
            captureArea.classList.add('generated');
            downloadBtn.classList.remove('hidden');
        });

        // Download Logic using html2canvas
        downloadBtn.addEventListener('click', () => {
            if (!qrCodeInstance) return;
            
            // html2canvas captures the div and turns it into an image
            html2canvas(document.querySelector("#capture-area"), { scale: 3, backgroundColor: "#ffffff" }).then(canvas => {
                const link = document.createElement('a');
                link.download = `VardhanFlow-Sticker-${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        });
    </script>
</body>
</html>
